<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soneium Chain Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050810;
    --surface: #0b1120;
    --surface2: #111a2e;
    --border: #1e2d4a;
    --accent: #00d4ff;
    --accent2: #7b4fff;
    --accent3: #ff4f9a;
    --green: #00ffb3;
    --text: #e8f0ff;
    --muted: #4a6080;
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  header { text-align: center; margin-bottom: 50px; }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }

  .search-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 40px;
  }

  .search-row { display: flex; gap: 12px; }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    outline: none;
  }

  .btn-analyze {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
  }

  .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--text); word-break: break-all;}

  .address-card {
    background: var(--surface2);
    padding: 20px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    border: 1px solid var(--accent);
  }

  #results { display: none; }
  .error-box { display: none; color: var(--accent3); padding: 15px; background: rgba(255, 79, 154, 0.1); border-radius: 8px; margin-bottom: 20px; }
  .tx-list { background: var(--surface); border-radius: 16px; margin-top: 30px; border: 1px solid var(--border); overflow: hidden; }
  .tx-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; padding: 15px; border-bottom: 1px solid var(--border); font-size: 12px; font-family: 'Space Mono'; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-badge">SONEIUM NETWORK · L2 ANALYZER</div>
    <h1>Chain Intelligence</h1>
  </header>

  <div class="search-wrap">
    <div class="search-row">
      <input type="text" id="addrInput" placeholder="Enter Soneium Address (0x...)" maxlength="42">
      <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">Analyze →</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div id="loading" style="display:none; text-align: center; margin-bottom: 20px; color: var(--accent);">
    <p>⚡ Fetching live chain data...</p>
  </div>

  <div id="results">
    <div class="address-card">
      <canvas id="addrAvatar" width="48" height="48" style="border-radius: 50%; border: 2px solid var(--accent);"></canvas>
      <div>
        <div style="font-size: 10px; color: var(--muted);">TARGET ADDRESS</div>
        <div id="displayAddr" style="font-family: 'Space Mono'; color: var(--accent);"></div>
      </div>
    </div>

    <div class="stats-grid" id="coreStats"></div>
    
    <div class="tx-list" id="txList">
      <div style="padding:15px; background: var(--surface2); font-size: 11px; color: var(--muted);">RECENT TRANSACTIONS</div>
      <div id="txContainer"></div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
    RPC: "https://rpc.soneium.org",
    EXPLORER_API: "https://explorer.soneium.org/api"
};

async function analyze() {
    const input = document.getElementById('addrInput');
    const addr = input.value.trim();
    const errorBox = document.getElementById('errorBox');
    const results = document.getElementById('results');
    const btn = document.getElementById('analyzeBtn');

    if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) {
        showError("Invalid Address: Please provide a valid 42-character EVM address.");
        return;
    }

    // UI Reset
    errorBox.style.display = 'none';
    btn.disabled = true;
    document.getElementById('loading').style.display = 'block';
    results.style.display = 'none';

    try {
        const [balanceHex, codeHex, txData] = await Promise.all([
            rpcRequest('eth_getBalance', [addr, 'latest']),
            rpcRequest('eth_getCode', [addr, 'latest']),
            fetch(`${CONFIG.EXPLORER_API}?module=account&action=txlist&address=${addr}&sort=desc`).then(r => r.json())
        ]);

        renderUI(addr, balanceHex, codeHex, txData.result || []);
    } catch (err) {
        showError("Node Error: Could not connect to Soneium. Check your network.");
    } finally {
        btn.disabled = false;
        document.getElementById('loading').style.display = 'none';
    }
}

async function rpcRequest(method, params) {
    const res = await fetch(CONFIG.RPC, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params })
    });
    const json = await res.json();
    return json.result;
}

function renderUI(addr, balanceHex, codeHex, txs) {
    document.getElementById('results').style.display = 'block';
    document.getElementById('displayAddr').innerText = addr;
    
    // Draw Avatar
    drawAvatar(addr);

    // Core Metrics
    const balance = parseInt(balanceHex, 16) / 1e18;
    const isContract = codeHex !== '0x' && codeHex !== '0x0';
    const score = calculateScore(txs);

    document.getElementById('coreStats').innerHTML = `
        ${statCard("Balance", `${balance.toFixed(4)} ETH`, "💰")}
        ${statCard("Account Type", isContract ? "Contract" : "EOA Wallet", "🛡️")}
        ${statCard("Activity Score", `${score}/100`, "⚡")}
        ${statCard("Last Seen", txs.length ? timeAgo(txs[0].timeStamp) : "Never", "🕒")}
    `;

    // Transactions
    const container = document.getElementById('txContainer');
    container.innerHTML = txs.length ? '' : '<div style="padding:20px; color:var(--muted)">No transactions found.</div>';
    
    txs.slice(0, 10).forEach(tx => {
        const row = document.createElement('div');
        row.className = 'tx-row';
        row.innerHTML = `
            <span style="color:var(--accent)">${tx.hash.slice(0,14)}...</span>
            <span>${(tx.value / 1e18).toFixed(4)} ETH</span>
            <span style="text-align:right; color:var(--muted)">${timeAgo(tx.timeStamp)}</span>
        `;
        container.appendChild(row);
    });
}

function statCard(label, val, icon) {
    return `<div class="stat-card"><div class="stat-label">${icon} ${label}</div><div class="stat-value">${val}</div></div>`;
}

function calculateScore(txs) {
    if(!txs.length) return 0;
    const freq = Math.min(txs.length * 5, 50);
    const recent = (Date.now()/1000 - txs[0].timeStamp) < 86400 ? 50 : 10;
    return freq + recent;
}

function timeAgo(ts) {
    const d = Math.floor((Date.now() / 1000) - ts);
    if (d < 60) return 'Just now';
    if (d < 3600) return Math.floor(d/60) + 'm ago';
    if (d < 86400) return Math.floor(d/3600) + 'h ago';
    return Math.floor(d/86400) + 'd ago';
}

function drawAvatar(addr) {
    const canvas = document.getElementById('addrAvatar');
    const ctx = canvas.getContext('2d');
    const seed = addr.slice(2, 10);
    const color = '#' + seed.slice(0, 6);
    ctx.fillStyle = '#0b1120';
    ctx.fillRect(0,0,48,48);
    ctx.fillStyle = color;
    // Simple 5-block pattern
    for(let i=0; i<5; i++) {
        if(parseInt(seed[i], 16) % 2 === 0) ctx.fillRect(i*8+4, 10, 6, 28);
    }
}

function showError(msg) {
    const box = document.getElementById('errorBox');
    box.innerText = msg;
    box.style.display = 'block';
}
</script>

</body>
</html>
