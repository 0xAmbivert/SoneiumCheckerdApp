<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soneium Intelligence | 4everland Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #030712; --surface: #0f172a; --border: #1e293b;
    --accent: #38bdf8; --accent2: #818cf8; --text: #f1f5f9; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
  .container { width: 100%; max-width: 500px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
  h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; text-align: center; background: linear-gradient(to right, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .desc { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; font-family: 'Space Mono'; }
  
  .input-wrap { position: relative; margin-bottom: 16px; }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 14px 16px; border-radius: 12px; color: #fff; font-family: 'Space Mono'; font-size: 13px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); }
  
  button { width: 100%; background: #fff; color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #results { display: none; margin-top: 24px; border-top: 1px solid var(--border); padding-top: 24px; animation: slideUp 0.3s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
  .stat-label { color: var(--muted); font-family: 'Space Mono'; }
  .stat-value { font-weight: 700; color: var(--accent); }
  
  .error { color: #f87171; font-size: 12px; margin-top: 12px; text-align: center; display: none; background: rgba(248, 113, 113, 0.1); padding: 10px; border-radius: 8px; }
  #loader { display: none; text-align: center; margin-top: 16px; font-size: 12px; color: var(--accent); font-family: 'Space Mono'; }
</style>
</head>
<body>

<div class="container">
  <h1>Soneium Analytica</h1>
  <p class="desc">Mainnet Intelligence Explorer</p>

  <div class="input-wrap">
    <input type="text" id="address" placeholder="Enter Wallet Address (0x...)" spellcheck="false">
  </div>
  <button id="mainBtn" onclick="analyze()">Search Network</button>
  
  <div id="loader">Scanning Soneium Mainnet...</div>
  <div id="error" class="error"></div>

  <div id="results">
    <div class="stat-row">
      <span class="stat-label">Balance</span>
      <span id="bal" class="stat-value">0.00 ETH</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Identity</span>
      <span id="type" class="stat-value">-</span>
    </div>
    <div style="margin-top: 16px;">
        <p class="stat-label" style="font-size: 11px; margin-bottom: 8px;">RECENT ACTIVITY</p>
        <div id="txs" style="font-size: 12px; font-family: 'Space Mono';"></div>
    </div>
  </div>
</div>

<script>
// We use Tenderly or DRPC as they handle browser CORS better than the raw RPC
const RPC_URL = "https://soneium.drpc.org"; 
const EXPLORER_API = "https://soneium.blockscout.com/api"; 

async function analyze() {
    const addr = document.getElementById('address').value.trim();
    const btn = document.getElementById('mainBtn');
    const err = document.getElementById('error');
    const res = document.getElementById('results');
    const loader = document.getElementById('loader');

    if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) {
        showErr("Please enter a valid 42-character address.");
        return;
    }

    // Reset UI
    btn.disabled = true;
    err.style.display = 'none';
    res.style.display = 'none';
    loader.style.display = 'block';

    try {
        // Parallel fetching to avoid timeouts on 4everland
        const [balHex, codeHex, txData] = await Promise.all([
            callRPC("eth_getBalance", [addr, "latest"]),
            callRPC("eth_getCode", [addr, "latest"]),
            fetch(`${EXPLORER_API}?module=account&action=txlist&address=${addr}&offset=3`).then(r => r.json())
        ]);

        // 1. Balance
        const balance = parseInt(balHex, 16) / 1e18;
        document.getElementById('bal').innerText = balance.toFixed(4) + " ETH";

        // 2. Account Type
        document.getElementById('type').innerText = (codeHex === '0x' || codeHex === '0x0') ? "Wallet (EOA)" : "Contract";

        // 3. Transactions
        const txDiv = document.getElementById('txs');
        txDiv.innerHTML = "";
        if (txData.result && Array.isArray(txData.result)) {
            txData.result.slice(0, 3).forEach(tx => {
                txDiv.innerHTML += `<div style="margin-bottom:6px; color:var(--muted)">TX: ${tx.hash.substring(0,10)}... <span style="color:var(--accent2)">${(tx.value/1e18).toFixed(3)} ETH</span></div>`;
            });
        } else {
            txDiv.innerHTML = "No recent activity found.";
        }

        loader.style.display = 'none';
        res.style.display = 'block';
    } catch (e) {
        console.error(e);
        showErr("Connection Refused. This is usually caused by browser security settings or RPC downtime.");
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}

async function callRPC(method, params) {
    const response = await fetch(RPC_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params })
    });
    const json = await response.json();
    if (json.error) throw new Error(json.error.message);
    return json.result;
}

function showErr(msg) {
    const err = document.getElementById('error');
    err.innerText = msg;
    err.style.display = 'block';
}
</script>
</body>
</html>
