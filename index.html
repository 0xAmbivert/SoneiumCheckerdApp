<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soneium Intelligence Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050810; --surface: #0b1120; --surface2: #111a2e;
    --border: #1e2d4a; --accent: #00d4ff; --accent2: #7b4fff;
    --accent3: #ff4f9a; --green: #00ffb3; --text: #e8f0ff;
    --muted: #4a6080;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; line-height: 1.6; }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  header { text-align: center; margin-bottom: 40px; }
  .logo-badge { font-family: 'Space Mono'; color: var(--accent); font-size: 12px; letter-spacing: 2px; margin-bottom: 10px; display: block; }
  
  /* Search Section */
  .search-box { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .input-group { display: flex; gap: 10px; margin-top: 15px; }
  input { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; font-family: 'Space Mono'; outline: none; }
  input:focus { border-color: var(--accent); }
  button { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
  button:hover { opacity: 0.9; transform: translateY(-2px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Results Section */
  #results { display: none; margin-top: 40px; animation: fadeIn 0.5s ease-in; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
  .card { background: var(--surface2); border: 1px solid var(--border); padding: 20px; border-radius: 15px; }
  .label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-family: 'Space Mono'; }
  .value { font-size: 1.2rem; font-weight: 700; margin-top: 5px; color: var(--accent); }
  .tx-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); font-family: 'Space Mono'; font-size: 12px; }
  
  .error-msg { color: var(--accent3); background: rgba(255,79,154,0.1); padding: 15px; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid var(--accent3); }
</style>
</head>
<body>

<div class="container">
  <header>
    <span class="logo-badge">SONEIUM MAINNET ANALYZER</span>
    <h1>Chain Intelligence</h1>
  </header>

  <div class="search-box">
    <div class="label">Enter Wallet Address</div>
    <div class="input-group">
      <input type="text" id="addrInput" placeholder="0x..." spellcheck="false">
      <button id="btn" onclick="runAnalysis()">Analyze</button>
    </div>
    <div id="error" class="error-msg"></div>
  </div>

  <div id="loader" style="display:none; text-align:center; margin-top:30px; color:var(--accent);">
    Connecting to Soneium RPC...
  </div>

  <div id="results">
    <div class="card" style="margin-bottom:15px; border-color:var(--accent2);">
        <div class="label">Account</div>
        <div id="resAddr" style="word-break:break-all; font-family:'Space Mono'; font-size:14px;"></div>
    </div>
    
    <div class="stats-grid">
      <div class="card">
        <div class="label">Balance</div>
        <div id="resBal" class="value">0.00 ETH</div>
      </div>
      <div class="card">
        <div class="label">Type</div>
        <div id="resType" class="value">EOA</div>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <div class="label" style="margin-bottom:10px;">Recent Activity</div>
        <div id="txList"></div>
    </div>
  </div>
</div>

<script>
// Use DRPC for Soneium - It has better CORS support for browser dApps
const RPC_ENDPOINT = "https://soneium.drpc.org";
const EXPLORER_API = "https://explorer.soneium.org/api";

async function runAnalysis() {
    const addr = document.getElementById('addrInput').value.trim();
    const btn = document.getElementById('btn');
    const errBox = document.getElementById('error');
    const resDiv = document.getElementById('results');
    const loader = document.getElementById('loader');

    // Validation
    if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) {
        showError("Invalid EVM address format.");
        return;
    }

    // UI State
    btn.disabled = true;
    errBox.style.display = 'none';
    resDiv.style.display = 'none';
    loader.style.display = 'block';

    try {
        // Parallel requests for speed
        const [balResponse, codeResponse, txResponse] = await Promise.all([
            fetchRPC("eth_getBalance", [addr, "latest"]),
            fetchRPC("eth_getCode", [addr, "latest"]),
            fetch(`${EXPLORER_API}?module=account&action=txlist&address=${addr}&offset=5&sort=desc`).then(r => r.json())
        ]);

        // Process Balance
        const ethBalance = parseInt(balResponse, 16) / 1e18;
        
        // Update UI
        document.getElementById('resAddr').innerText = addr;
        document.getElementById('resBal').innerText = ethBalance.toFixed(5) + " ETH";
        document.getElementById('resType').innerText = codeResponse === '0x' ? "Wallet (EOA)" : "Smart Contract";
        
        // Process Transactions
        const txList = document.getElementById('txList');
        txList.innerHTML = "";
        if (txResponse.result && Array.isArray(txResponse.result)) {
            txResponse.result.slice(0, 5).forEach(tx => {
                const item = document.createElement('div');
                item.className = 'tx-item';
                item.innerHTML = `
                    <span>${tx.hash.substring(0, 10)}...</span>
                    <span style="color:var(--green)">${(tx.value/1e18).toFixed(4)} ETH</span>
                `;
                txList.appendChild(item);
            });
        } else {
            txList.innerHTML = "<div class='label'>No recent transactions found</div>";
        }

        resDiv.style.display = 'block';
    } catch (e) {
        console.error(e);
        showError("Connectivity Error: The Soneium Node or Explorer blocked the request. Try disabling Ad-Blockers or checking your VPN.");
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}

async function fetchRPC(method, params) {
    const response = await fetch(RPC_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            jsonrpc: "2.0",
            id: Date.now(),
            method: method,
            params: params
        })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.result;
}

function showError(msg) {
    const errBox = document.getElementById('error');
    errBox.innerText = msg;
    errBox.style.display = 'block';
}
</script>
</body>
</html>
