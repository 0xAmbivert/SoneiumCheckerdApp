<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soneium Checkerd App</title>
    <style>
        /* Mobile responsive design */
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        @media (max-width: 600px) {
            body { font-size: 14px; }
        }
        .loading { display: none; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Soneium Checkerd App</h1>
    <div class="loading" id="loading">Loading...</div>
    <div class="error" id="error" style="display: none;"></div>
    <script>
        const CONFIG = {
            REQUEST_TIMEOUT: 12000, // 12 seconds
            MAX_TRANSACTIONS: 1000,
            API_ENDPOINT: 'https://api.example.com',
        };

        async function fetchData() {
            let retries = 0;
            const maxRetries = 2;
            const backoff = (retry) => Math.pow(2, retry) * 1000; // Exponential backoff

            while (true) {
                try {
                    const response = await Promise.race([
                        fetch(CONFIG.API_ENDPOINT),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out')), CONFIG.REQUEST_TIMEOUT))
                    ]);

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();

                    // Validate JSON-RPC structure
                    if (!data.jsonrpc || !data.result) {
                        throw new Error('Invalid JSON-RPC structure');
                    }

                    // Process data...
                    console.log(data.result);
                    break; // Exit loop on success
                } catch (error) {
                    console.error('Fetch error: ', error);
                    retries++;
                    if (retries > maxRetries) {
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('error').innerText = 'An error occurred: ' + error.message;
                        document.getElementById('error').style.display = 'block';
                        break;
                    }
                    await new Promise(resolve => setTimeout(resolve, backoff(retries)));
                }
            }
        }

        document.addEventListener('DOMContentLoaded', fetchData);
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                fetchData(); // Trigger fetch on Enter key
            }
        });
    </script>
</body>
</html>
